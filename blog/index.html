<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — TenerifIA · Inteligencia Artificial en Tenerife</title>
  <meta name="description" content="Artículos sobre inteligencia artificial para negocios en Tenerife. Chatbots, automatizaciones y casos prácticos de IA en Canarias." />
  <link rel="canonical" href="https://tenerifia.com/blog/" />
  <link rel="icon" type="image/png" href="../logo-tenerifia.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080f1a;
      --bg2: #0c1725;
      --blue: #1a7fd4;
      --cyan: #29c5f6;
      --text: #e8edf5;
      --muted: #8899aa;
      --grad: linear-gradient(135deg, #1060b8, #29c5f6);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.06); }
    nav a { text-decoration: none; color: var(--text); }
    .nav-logo img { height: 40px; }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { color: var(--muted); font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover { color: var(--cyan); }
    .hero { text-align: center; padding: 5rem 2rem 3rem; }
    .hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; margin-bottom: 1rem; }
    .hero h1 span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.6; }
    .blog-grid { max-width: 1100px; margin: 3rem auto; padding: 0 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
    .blog-card { background: var(--bg2); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 2rem; transition: border-color 0.2s, transform 0.2s; text-decoration: none; color: var(--text); display: block; }
    .blog-card:hover { border-color: var(--blue); transform: translateY(-3px); }
    .card-tag { display: inline-block; background: rgba(26,127,212,0.15); color: var(--cyan); font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.8rem; border-radius: 20px; margin-bottom: 1rem; letter-spacing: 0.5px; text-transform: uppercase; }
    .card-date { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.75rem; }
    .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.4; }
    .card-desc { color: var(--muted); font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.25rem; }
    .card-link { color: var(--cyan); font-size: 0.875rem; font-weight: 600; }
    .loading { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(41,197,246,0.2); border-top-color: var(--cyan); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); grid-column: 1/-1; }
    footer { text-align: center; padding: 3rem 2rem; color: var(--muted); font-size: 0.85rem; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 4rem; }
    footer a { color: var(--muted); text-decoration: none; margin: 0 1rem; }
    footer a:hover { color: var(--cyan); }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-logo"><img src="../logo-tenerifia.png" alt="TenerifIA" /></a>
    <div class="nav-links">
      <a href="../index.html">Inicio</a>
      <a href="../servicios.html">Servicios</a>
      <a href="../index.html#contacto">Contacto</a>
    </div>
  </nav>

  <div class="hero">
    <h1>Blog <span>TenerifIA</span></h1>
    <p>Casos prácticos, guías y novedades sobre inteligencia artificial para negocios en Tenerife.</p>
  </div>

  <div class="blog-grid" id="articles">
    <div class="loading" style="grid-column:1/-1">
      <div class="loading-spinner"></div>
      <p>Cargando artículos...</p>
    </div>
  </div>

  <footer>
    <a href="../index.html">Inicio</a>
    <a href="../servicios.html">Servicios</a>
    <a href="mailto:marco@tenerifia.com">marco@tenerifia.com</a>
    <p style="margin-top:1rem;">© 2026 TenerifIA · Tenerife</p>
  </footer>

  <script>
    async function loadArticles() {
      const grid = document.getElementById('articles');
      try {
        const res = await fetch('https://api.github.com/repos/tenerifiaa-cmd/tenerifia-web/contents/blog');
        const files = await res.json();

        const articles = files
          .filter(f => f.name.endsWith('.html') && f.name !== 'index.html')
          .sort((a, b) => b.name.localeCompare(a.name));

        if (articles.length === 0) {
          grid.innerHTML = '<div class="empty-state"><p>Próximamente nuevos artículos.</p></div>';
          return;
        }

        grid.innerHTML = articles.map(file => {
          const dateMatch = file.name.match(/(\d{4}-\d{2}-\d{2})/);
          const date = dateMatch ? formatDate(dateMatch[1]) : '';
          const title = file.name.replace(/articulo-\d{4}-\d{2}-\d{2}\.html/, '').trim() || titleFromFilename(file.name);
          return `
            <a href="${file.name}" class="blog-card">
              <span class="card-tag">IA · Tenerife</span>
              ${date ? `<div class="card-date">${date}</div>` : ''}
              <div class="card-title">${title}</div>
              <div class="card-desc">Estrategias de inteligencia artificial aplicadas a negocios locales en Tenerife y Canarias.</div>
              <span class="card-link">Leer artículo →</span>
            </a>`;
        }).join('');
      } catch (e) {
        grid.innerHTML = '<div class="empty-state"><p>No se pudieron cargar los artículos.</p></div>';
      }
    }

    function formatDate(str) {
      const [y, m, d] = str.split('-');
      const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
    }

    function titleFromFilename(name) {
      return name.replace('.html','').replace(/-/g,' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    loadArticles();
  </script>
</body>
</html>
